name: Bootstrap Terraform Backend

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    env:
      LOCATION: eastus
      RG_NAME: rg-tfstate-dev-valt
      STORAGE_NAME: stadmintfstateadmin
      CONTAINER_NAME: tfstate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login using OIDC (secure, no secrets)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      # Create RG (safe to re-run; Azure does not error if it already exists)
      - name: Create Resource Group
        run: |
          az group create \
            --name $RG_NAME \
            --location $LOCATION

      # Create Storage Account (fail if already exists, because name must be globally unique)
      - name: Create Storage Account
        run: |
          az storage account create \
            --name $STORAGE_NAME \
            --resource-group $RG_NAME \
            --location $LOCATION \
            --sku Standard_LRS \
            --kind StorageV2 \
            --allow-blob-public-access false

      # Create container (safe to re-run)
      - name: Create Blob Container
        run: |
          az storage container create \
            --name $CONTAINER_NAME \
            --account-name $STORAGE_NAME

      # Assign RBAC (safe to re-run; assignment will be skipped if exists)
      - name: Assign RBAC
        run: |
          az role assignment create \
            --assignee ${{ secrets.ARM_CLIENT_ID }} \
            --role "Storage Blob Data Contributor" \
            --scope /subscriptions/${{ secrets.ARM_SUBSCRIPTION_ID }}/resourceGroups/$RG_NAME/providers/Microsoft.Storage/storageAccounts/$STORAGE_NAME

      # Output details
      - name: Output Backend Details
        run: |
          echo "Resource Group: $RG_NAME"
          echo "Storage Account: $STORAGE_NAME"
          echo "Container: $CONTAINER_NAME"